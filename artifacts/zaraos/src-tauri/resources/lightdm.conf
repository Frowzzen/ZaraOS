# ============================================================
# ZaraOS — LightDM Configuration
#
# Install to: /etc/lightdm/lightdm.conf
#
# Configures auto-login for the 'zaraos' user so the OS boots
# directly to the ZaraOS desktop without a login screen.
# The KDE Wallet / GNOME Keyring unlock prompt is suppressed
# since ZaraOS handles its own encrypted key storage.
#
# Plymouth splash → LightDM → Openbox autostart → ZaraOS Tauri binary
# ============================================================

[Seat:*]
# Auto-login: boots directly to ZaraOS desktop
autologin-user=zaraos
autologin-user-timeout=0

# Session: Openbox launches the ZaraOS binary directly
user-session=zaraos-openbox

# Display server: Xorg (Wayland support planned for Beta)
type=local
xserver-command=/usr/bin/X -nolisten tcp

# Greeter (shown only if auto-login fails)
greeter-session=lightdm-gtk-greeter

# No guest sessions on a personal OS
allow-guest=false
